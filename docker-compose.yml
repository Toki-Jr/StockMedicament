services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: robert
      POSTGRES_PASSWORD: robert
      POSTGRES_DB: stockmedicament
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: node_server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - server_modules:/app/node_modules
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://robert:robert@db:5432/stockmedicament"
      PORT: 5000
      JWT_SECRET: stock_medoc_super_secret_key_2024
      JWT_EXPIRES_IN: 24h
      NODE_ENV: development
    env_file:
      - ./server/.env
    command: >
      sh -c "sleep 5 &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             npm run dev"

  client:
    build: ./client 
    container_name: react_client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_modules:/app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - server

volumes:
  db_data:
  server_modules:
  client_modules: